name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  # The root Cargo.toml is both a `[package]` and a `[workspace]`, so a bare `cargo
  # test` builds and tests ONLY the root package -- it silently skipped 132 tests in
  # quoin-syntax / quoin-fmt / quoin-ext / quoin-ext-proto (453 run of 585) and still
  # reported green. `--workspace` reaches them. The two dylint crates are excluded
  # because they link `rustc-private` and only build on nightly; the `lint` job below
  # builds them with the toolchain they pin themselves.
  WORKSPACE: --workspace --exclude no_gc_across_yield --exclude no_borrow_across_yield

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose $WORKSPACE
    - name: Run tests
      run: cargo test --verbose $WORKSPACE
    - name: Run Quoin tests
      run: cargo run --verbose -- test qnlib/tests
    # Every fenced example in the reference docs and the language book must run and match
    # its `"* -> value` annotations (docs/internal/DOCS_ARCH.md phase 3 / RELEASE_PREP Tier 2).
    - name: Check documentation examples
      run: |
        cargo run -- doc --check --stdlib
        cargo run -- doc --check docs/language README.md

  # Dylint lints: no_borrow_across_yield is deny-level (a violation fails this
  # job); no_gc_across_yield stays advisory (warnings only). The lint libraries
  # pin their own nightly via rust-toolchain files, which rustup fetches on use.
  lint:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install dylint
      run: cargo install cargo-dylint dylint-link
    - name: Run lints
      run: cargo dylint --all
