name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
    - name: Run Quoin tests
      run: cargo run --verbose -- test qnlib/tests

  # Dylint lints: no_borrow_across_yield is deny-level (a violation fails this
  # job); no_gc_across_yield stays advisory (warnings only). The lint libraries
  # pin their own nightly via rust-toolchain files, which rustup fetches on use.
  lint:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install dylint
      run: cargo install cargo-dylint dylint-link
    - name: Run lints
      run: cargo dylint --all
