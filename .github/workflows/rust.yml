name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  # The root Cargo.toml is both a `[package]` and a `[workspace]`, so a bare `cargo
  # test` builds and tests ONLY the root package -- it silently skipped 132 tests in
  # quoin-syntax / quoin-fmt / quoin-ext / quoin-ext-proto (453 run of 585) and still
  # reported green. `--workspace` reaches them. The two dylint crates are excluded
  # because they link `rustc-private` and only build on nightly; the `lint` job below
  # builds them with the toolchain they pin themselves.
  WORKSPACE: --workspace --exclude no_gc_across_yield --exclude no_borrow_across_yield

jobs:
  test:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: Swatinem/rust-cache@v2
    # Tests run under nextest -- each test its own process, parallel across binaries
    # (~4x less wall time than `cargo test`, which runs the 46 test binaries serially).
    # There are zero doctests in this workspace, so nextest loses no coverage. Installed
    # from nextest's own release endpoint to avoid a marketplace action.
    - name: Install nextest
      run: curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C "${CARGO_HOME:-$HOME/.cargo}/bin"
    - name: Build
      run: cargo build --verbose $WORKSPACE
    - name: Run tests
      run: cargo nextest run $WORKSPACE
    - name: Run Quoin tests
      run: cargo run --verbose -- test qnlib/tests
    # Every fenced example in the reference docs and the language book must run and match
    # its `"* -> value` annotations (docs/internal/DOCS_ARCH.md phase 3 / RELEASE_PREP Tier 2).
    - name: Check documentation examples
      run: |
        cargo run -- doc --check --stdlib
        cargo run -- doc --check docs/language README.md

  fmt:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Check formatting
      run: cargo fmt --all --check

  clippy:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: Swatinem/rust-cache@v2
    - name: Install clippy
      run: rustup component add clippy
    # Same workspace scope as `test`: the two dylint crates link `rustc-private` and only
    # build on their pinned nightly, so stable clippy excludes them (the `lint` job runs
    # them). `--all-targets` covers tests/benches too; `-D warnings` fails CI on any lint.
    - name: Run clippy
      run: cargo clippy $WORKSPACE --all-targets -- -D warnings

  # The browser-playground build: the VM library and the quoin-wasm bindings must
  # keep compiling (and stay clippy-clean) for wasm32-unknown-unknown, and the
  # cdylib must keep linking (the stack-size link-arg in .cargo/config.toml only
  # exercises at link time, which `check`/`clippy` skip). Runtime behavior is
  # covered natively by direct_runner_tests.rs; the Node smoke test
  # (scripts/wasm_smoke.mjs) stays a local pre-deploy step.
  wasm:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: Swatinem/rust-cache@v2
    - name: Install clippy and the wasm target
      run: |
        rustup component add clippy
        rustup target add wasm32-unknown-unknown
    - name: Clippy the library for wasm32
      run: cargo clippy --lib -p quoin --target wasm32-unknown-unknown -- -D warnings
    - name: Clippy quoin-wasm for wasm32
      run: cargo clippy -p quoin-wasm --target wasm32-unknown-unknown -- -D warnings
    - name: Link the cdylib
      run: cargo build -p quoin-wasm --target wasm32-unknown-unknown

  # Dylint lints: both yield-safety lints are deny-level -- a violation fails
  # this job; an audited #[allow] at the site is the escape hatch. The lint
  # libraries pin their own nightly via rust-toolchain files, which rustup
  # fetches on use.
  lint:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: Swatinem/rust-cache@v2
    - name: Install dylint
      run: cargo install cargo-dylint dylint-link
    - name: Run lints
      run: cargo dylint --all
