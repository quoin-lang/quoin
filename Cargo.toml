[package]
name = "new-vm"
version = "0.1.0"
edition = "2024"
[workspace]
members = [
    ".",
    "lint/no_gc_across_yield",
]

[workspace.metadata.dylint]
libraries = [
    { path = "lint/no_gc_across_yield" }
]
[profile.profiling]
inherits = "release"
debug = true

[dependencies]
gc-arena = "0.6.0"
antlr-rust = "0.3.0-beta"
regex = "1.10"
once_cell = "1.21.4"
substring = "1.4.5"
cargo-llvm-cov = "0.8.7"
ulid = "1.2.1"
glob = "0.3.3"
pest = "2.8.6"
pest_derive = "2.8.6"
corosensei = "0.1.4"
console = "0.15"

