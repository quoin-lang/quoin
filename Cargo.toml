[package]
name = "quoin"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "qn"
path = "src/main.rs"

[workspace]
members = [
    ".",
    "crates/quoin-syntax",
    "lint/no_gc_across_yield",
]

[workspace.metadata.dylint]
libraries = [
    { path = "lint/no_gc_across_yield" }
]
[profile.profiling]
inherits = "release"
debug = true

[features]
# mimalloc is the global allocator for optimized builds (release/profiling);
# debug builds fall back to the system allocator via a `debug_assertions` gate
# in main.rs, so malloc-debug tooling keeps working. Disable everywhere with
# `--no-default-features`.
default = ["mimalloc"]
mimalloc = ["dep:mimalloc"]

[dependencies]
quoin-syntax = { path = "crates/quoin-syntax", features = ["gc"] }
gc-arena = "0.6.0"
regex = "1.10"
once_cell = "1.21.4"
substring = "1.4.5"
cargo-llvm-cov = "0.8.7"
glob = "0.3.3"
corosensei = "0.1.4"
console = "0.15"
mimalloc = { version = "0.1", optional = true }
rustc-hash = "2"

